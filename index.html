<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夢幻星空探索扭蛋機 - 雲端同步版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase 配置
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'gacha-pro-sync';

        // 全域狀態
        let inventory = { speaker: 0, tableware: 0, bag: 0 };
        let user = null;
        let isSpinning = false;

        const prizeNames = {
            speaker: "藍芽音響 🔊",
            tableware: "企業環保餐具 🍴",
            bag: "企業帆布袋 👜"
        };

        const colors = [
            'radial-gradient(circle at 30% 30%, #f472b6, #db2777)', 
            'radial-gradient(circle at 30% 30%, #818cf8, #4338ca)', 
            'radial-gradient(circle at 30% 30%, #34d399, #059669)', 
            'radial-gradient(circle at 30% 30%, #fbbf24, #d97706)', 
            'radial-gradient(circle at 30% 30%, #c084fc, #7c3aed)'  
        ];

        // 初始化與監聽雲端數據
        async function initApp() {
            // 執行驗證 (RULE 3)
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth Error:", err);
            }

            onAuthStateChanged(auth, (u) => {
                user = u;
                if (user) {
                    // 修正路徑：確保為偶數段 (RULE 1)
                    // 使用 doc(db, 'artifacts', appId, 'public', 'data', 'inventory', 'current') 確保路徑段數為 6 (偶數)
                    const inventoryRef = doc(db, 'artifacts', appId, 'public', 'data', 'inventory', 'current');
                    
                    onSnapshot(inventoryRef, (snapshot) => {
                        if (snapshot.exists()) {
                            inventory = snapshot.data();
                            updateStockUI();
                        } else {
                            // 第一次運行，初始化庫存
                            setDoc(inventoryRef, { speaker: 5, tableware: 10, bag: 5 });
                        }
                    }, (error) => {
                        console.error("Firestore Snapshot Error:", error);
                    });
                }
            });
            initEggPit();
        }

        function updateStockUI() {
            const total = inventory.speaker + inventory.tableware + inventory.bag;
            const statusText = document.getElementById('status-text');
            if (total <= 0) {
                statusText.innerText = "物資已全數發送完畢";
                statusText.classList.add('text-red-400');
            } else {
                statusText.innerText = "夢幻星空復活節限定 - 點擊核心抽獎";
                statusText.classList.remove('text-red-400');
            }
        }

        window.startGacha = async function() {
            if (isSpinning || !user) return;
            const total = inventory.speaker + inventory.tableware + inventory.bag;
            if (total <= 0) {
                alert("太遲了！所有獎品已被搶購一空。");
                return;
            }

            isSpinning = true;
            const knob = document.getElementById('gacha-knob');
            const pit = document.getElementById('egg-pit');
            
            knob.style.transform = 'rotate(720deg)';
            pit.classList.add('shaking');

            // 抽獎邏輯
            const prize = pickPrize();
            
            // 同步到雲端 (原子更新庫存)
            try {
                const inventoryRef = doc(db, 'artifacts', appId, 'public', 'data', 'inventory', 'current');
                const newStock = { ...inventory };
                if (newStock[prize] > 0) {
                    newStock[prize]--;
                    await setDoc(inventoryRef, newStock);
                    
                    setTimeout(() => {
                        pit.classList.remove('shaking');
                        showFallingBall(prize);
                    }, 1200);
                } else {
                    throw new Error("獎品剛好被抽完了");
                }
            } catch (err) {
                console.error("更新失敗:", err);
                isSpinning = false;
                pit.classList.remove('shaking');
                knob.style.transform = 'rotate(0deg)';
            }
        }

        function pickPrize() {
            const pool = [];
            for (const [key, count] of Object.entries(inventory)) {
                for (let i = 0; i < count; i++) pool.push(key);
            }
            return pool[Math.floor(Math.random() * pool.length)];
        }

        function initEggPit() {
            const pit = document.getElementById('egg-pit');
            if (!pit) return;
            pit.innerHTML = '';
            for (let i = 0; i < 40; i++) {
                const egg = document.createElement('div');
                egg.className = 'bg-egg';
                egg.style.background = colors[Math.floor(Math.random() * colors.length)];
                egg.style.left = `${Math.random() * 85 + 2}%`;
                egg.style.top = `${Math.random() * 75 + 15}%`;
                const tx = (Math.random() - 0.5) * 60;
                const ty = (Math.random() - 0.5) * 60;
                egg.style.setProperty('--tx', `${tx}px`);
                egg.style.setProperty('--ty', `${ty}px`);
                egg.style.transform = `scale(${0.7 + Math.random() * 0.4}) rotate(${Math.random() * 360}deg)`;
                pit.appendChild(egg);
            }
        }

        function showFallingBall(prize) {
            const ball = document.getElementById('falling-ball');
            const grad = colors[Math.floor(Math.random() * colors.length)];
            ball.style.background = grad;
            ball.style.display = 'block';
            ball.classList.add('dropping');
            setTimeout(() => {
                ball.classList.remove('dropping');
                ball.style.display = 'none';
                showResult(prize, grad);
            }, 850);
        }

        function showResult(prize, grad) {
            const overlay = document.getElementById('overlay');
            const resultContainer = document.getElementById('result-container');
            const giftName = document.getElementById('gift-name');
            const ballTop = document.getElementById('result-ball-top');
            ballTop.style.background = grad;
            giftName.innerText = prizeNames[prize];
            overlay.style.display = 'block';
            resultContainer.style.display = 'block';
            setTimeout(() => resultContainer.classList.add('opened'), 100);
        }

        window.closeResult = function() {
            const overlay = document.getElementById('overlay');
            const resultContainer = document.getElementById('result-container');
            const knob = document.getElementById('gacha-knob');
            resultContainer.classList.remove('opened');
            setTimeout(() => {
                overlay.style.display = 'none';
                resultContainer.style.display = 'none';
                knob.style.transform = 'rotate(0deg)';
                isSpinning = false;
            }, 600);
        }

        window.onload = initApp;
    </script>
    <style>
        :root { --machine-color: #4338ca; --glass-color: rgba(255, 255, 255, 0.2); --accent-color: #f472b6; }
        body { background: linear-gradient(135deg, #1e1b4b 0%, #4c1d95 40%, #db2777 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: sans-serif; overflow: hidden; margin: 0; color: white; }
        .stars { position: fixed; inset: 0; pointer-events: none; z-index: 1; background-image: radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)), radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)); background-repeat: repeat; opacity: 0.4; }
        .earth-bottom { position: absolute; bottom: -250px; width: 1000px; height: 500px; background: radial-gradient(circle at top, #818cf8 0%, #4338ca 50%, #1e1b4b 100%); border-radius: 50%; z-index: 2; box-shadow: 0 -20px 80px rgba(129, 140, 248, 0.6); }
        .gacha-container { position: relative; width: 360px; height: 580px; z-index: 10; }
        .machine-top { width: 100%; height: 340px; background: var(--glass-color); border: 6px solid rgba(255, 255, 255, 0.4); border-radius: 180px 180px 40px 40px; position: relative; overflow: hidden; backdrop-filter: blur(8px); }
        @keyframes tumble { 0% { transform: translate(0, 0) rotate(0deg); } 25% { transform: translate(var(--tx), var(--ty)) rotate(90deg); } 50% { transform: translate(calc(var(--tx) * -1), calc(var(--ty) * 0.5)) rotate(180deg); } 100% { transform: translate(0, 0) rotate(360deg); } }
        .shaking .bg-egg { animation: tumble 0.4s infinite; }
        .machine-bottom { width: 100%; height: 240px; background: linear-gradient(180deg, #4338ca 0%, #312e81 100%); border: 6px solid rgba(255, 255, 255, 0.4); border-top: none; border-radius: 0 0 60px 60px; position: relative; }
        .knob { width: 100px; height: 100px; background: white; border: 5px solid var(--accent-color); border-radius: 50%; position: relative; transition: transform 0.8s; box-shadow: 0 0 20px var(--accent-color); cursor: pointer; }
        .knob::after { content: '✦'; position: absolute; font-size: 40px; color: var(--accent-color); top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .exit-slot { width: 110px; height: 80px; background: #1e1b4b; position: absolute; bottom: 35px; left: 50%; transform: translateX(-50%); border-radius: 15px; border: 3px solid white; }
        .bg-egg { position: absolute; width: 70px; height: 70px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); box-shadow: inset -8px -8px 15px rgba(0,0,0,0.3); --tx: 10px; --ty: -10px; }
        .ball { width: 80px; height: 80px; border-radius: 50%; position: absolute; z-index: 25; border: 3px solid white; display: none; }
        @keyframes dropBall { 0% { transform: translate(-50%, -100px); opacity: 0; } 100% { transform: translate(-50%, 250px); opacity: 1; } }
        .dropping { animation: dropBall 0.8s forwards; left: 50%; }
        .ball-open-container { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; z-index: 100; }
        .ball-half { width: 180px; height: 90px; border: 4px solid white; transition: all 0.6s; }
        .ball-top { border-radius: 90px 90px 0 0; background: var(--accent-color); }
        .ball-bottom { border-radius: 0 0 90px 90px; background: white; }
        .opened .ball-top { transform: translateY(-120px) rotate(-20deg); opacity: 0; }
        .opened .ball-bottom { transform: translateY(120px) rotate(20deg); opacity: 0; }
        .gift-appear { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); width: 300px; transition: all 0.6s 0.3s; z-index: 101; text-align: center; }
        .opened .gift-appear { transform: translate(-50%, -50%) scale(1.1); }
        #overlay { position: fixed; inset: 0; background: rgba(30, 27, 75, 0.8); backdrop-filter: blur(10px); display: none; z-index: 90; }
    </style>
</head>
<body>

<div class="stars"></div>
<div class="earth-bottom"></div>

<div class="flex flex-col items-center relative z-20">
    <div class="mb-6 text-center">
        <h1 class="text-4xl font-black text-white drop-shadow-[0_0_10px_rgba(255,255,255,0.5)] mb-1">STARRY SURPRISE</h1>
        <p id="status-text" class="text-pink-300 font-bold tracking-widest text-sm italic">夢幻星空復活節限定 - 初始化中...</p>
    </div>

    <div class="gacha-container">
        <div class="machine-top" id="egg-pit"></div>
        <div class="machine-bottom flex justify-center items-start pt-8">
            <div class="knob" id="gacha-knob" onclick="startGacha()"></div>
            <div class="exit-slot"></div>
        </div>
        <div id="falling-ball" class="ball"></div>
    </div>
    <p class="mt-8 text-white/70 font-bold animate-bounce">點擊發光核心旋轉</p>
</div>

<div id="overlay"></div>
<div id="result-container" class="ball-open-container">
    <div class="ball-half ball-top" id="result-ball-top"></div>
    <div class="gift-appear" id="gift-text">
        <div class="text-pink-200 text-xs tracking-widest mb-2 uppercase">Discovery Found</div>
        <div id="gift-name" class="bg-white text-indigo-900 font-bold px-6 py-5 rounded-2xl shadow-[0_0_40px_rgba(244,114,182,0.6)] border-4 border-pink-400"></div>
        <button onclick="closeResult()" class="mt-10 bg-pink-500 text-white font-bold py-3 px-10 rounded-full hover:bg-pink-400 transition-all shadow-lg active:scale-95">收下禮物</button>
    </div>
    <div class="ball-half ball-bottom"></div>
</div>

</body>
</html>
